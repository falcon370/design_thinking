<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crowd Density Monitor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <header>
            <h1>Campus Density Map</h1>
            <p>Real-time crowd monitoring</p>
        </header>

        <main>
            <div class="map-container">
                <!-- Simulated Layout -->
                <div class="room-card" id="room-1">
                    <div class="room-header">
                        <h2>Central Library</h2>
                        <span class="status-badge" id="status-badge">Loading...</span>
                    </div>
                    <div class="visual-indicator" id="visual-indicator">
                        <div class="pulse-ring"></div>
                        <span class="icon">👥</span>
                    </div>
                    <div class="stats">
                        <p>Occupancy: <strong id="count-display">--</strong> heads</p>
                        <p>Status: <strong id="status-text">Checking...</strong></p>
                    </div>
                </div>

                <!-- You could add more rooms here in the future -->
                <div class="room-card inactive">
                    <div class="room-header">
                        <h2>Cafeteria</h2>
                        <span class="status-badge gray">Offline</span>
                    </div>
                    <div class="visual-indicator gray">
                        <span class="icon">☕</span>
                    </div>
                    <div class="stats">
                        <p>Occupancy: --</p>
                    </div>
                </div>
            </div>
            
            <div class="video-preview">
                 <h3>Live Feed Preview</h3>
                 <!-- Pointing to the flask video feed -->
                 <img src="http://localhost:5000/video_feed" alt="Live Feed" id="live-feed" onerror="this.style.display='none';">
                 <p class="note">Feed is processed locally. Privacy preserved.</p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
