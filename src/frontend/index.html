<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Plus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .status-card {
            transition: all 0.3s;
            height: 100%;
        }
        .bg-low { background-color: #d4edda; color: #155724; }
        .bg-medium { background-color: #fff3cd; color: #856404; }
        .bg-high { background-color: #f8d7da; color: #721c24; }
        .card-title { font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="text-center mb-5">
        <h1>NITW CrowdPlus System</h1>
        <p class="text-muted">Real-time monitoring of Campus locations</p>
    </div>

    <div class="row g-4" id="cards-container">
        <!-- Cards will be injected here by JavaScript -->
    </div>
    
    <div class="text-center mt-4">
        <small class="text-muted">V1.0</small>
    </div>
</div>

<script src="config.js"></script>
<script>
    const BASE_API_URL = `${API_CONFIG.BASE_URL}/current-status`;

    // CONFIGURATION: Define your locations here
    // sourceId allows multiple cards to pull from the same backend location for demo purposes
    const LOCATIONS = [
        { id: "canteen1", name: "Canteen (North)", sourceId: "canteen" },
        { id: "canteen2", name: "Canteen (South)", sourceId: "canteen" },
        { id: "canteen3", name: "Canteen (Entrance)", sourceId: "canteen" },
        { id: "library", name: "Library", sourceId: "library" }
    ];

    const container = document.getElementById("cards-container");

    // 1. Generate Cards Dynamically
    LOCATIONS.forEach(loc => {
        const cardHtml = `
        <div class="col-md-6">
            <div class="card shadow-sm h-100">
                <div class="card-body text-center status-card" id="card-${loc.id}">
                    <h5 class="card-title">${loc.name}</h5>
                    <h2 class="display-4 fw-bold density-level">--</h2>
                    <p class="card-text">
                        Person Count: <span class="fw-bold person-count">--</span>
                    </p>
                    <hr>
                    <div class="row">
                        <div class="col-6">
                            <small class="text-muted">Trend</small><br>
                            <span class="trend-indicator">--</span>
                        </div>
                        <div class="col-6">
                            <small class="text-muted">Last Updated</small><br>
                            <span class="last-updated">--</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>`;
        container.innerHTML += cardHtml;
    });

    async function fetchAndUpdate(cardId, locationId) {
        try {
            const response = await fetch(`${BASE_API_URL}/${locationId}`);
            if (!response.ok) throw new Error("Network response was not ok");
            const data = await response.json();
            updateCard(cardId, data);
        } catch (error) {
            // console.error(`Error fetching data for ${cardId}:`, error);
            setOffline(cardId);
        }
    }

    function updateCard(cardId, data) {
        const card = document.getElementById(cardId);
        if (!card) return;

        const densityEl = card.querySelector(".density-level");
        const countEl = card.querySelector(".person-count");
        const trendEl = card.querySelector(".trend-indicator");
        const timeEl = card.querySelector(".last-updated");

        densityEl.innerText = data.density_level;
        countEl.innerText = data.count;
        trendEl.innerText = data.trend;
        timeEl.innerText = new Date(data.timestamp).toLocaleTimeString();

        // Update Color
        card.className = "card-body text-center status-card"; // Reset
        if (data.density_level === "Low") {
            card.classList.add("bg-low");
        } else if (data.density_level === "Medium") {
            card.classList.add("bg-medium");
        } else if (data.density_level === "High") {
            card.classList.add("bg-high");
        }
    }

    function setOffline(cardId) {
        const card = document.getElementById(cardId);
        if (!card) return;
        card.querySelector(".density-level").innerText = "Offline";
        card.className = "card-body text-center status-card bg-light";
    }

    // 3. Start Polling (Randomized)
    function startRandomPolling(loc) {
        const cardId = `card-${loc.id}`;
        const sourceId = loc.sourceId || loc.id; // Fallback to id if sourceId not set

        const poll = async () => {
            await fetchAndUpdate(cardId, sourceId);
            
            // Schedule next update with random delay between 1.5s and 3.5s
            // This creates the "random sequence" effect
            const nextDelay = Math.floor(Math.random() * 2000) + 1500;
            setTimeout(poll, nextDelay);
        };

        // Initial start with random offset (0-1000ms)
        setTimeout(poll, Math.random() * 1000);
    }

    LOCATIONS.forEach(loc => startRandomPolling(loc));
</script>

</body>
</html>
