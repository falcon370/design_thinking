<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Plus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .status-card {
            transition: all 0.3s;
            height: 100%;
        }
        .bg-low { background-color: #d4edda; color: #155724; }
        .bg-medium { background-color: #fff3cd; color: #856404; }
        .bg-high { background-color: #f8d7da; color: #721c24; }
        .card-title { font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="text-center mb-5">
        <h1>NITW CrowdPlus System</h1>
        <p class="text-muted">Real-time monitoring of Campus locations</p>
    </div>

    <div class="row g-4" id="cards-container">
        <!-- Live Video Card -->
        <div class="col-md-8">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0" id="stream-title">Live Edge Feed</h5>
                </div>
                <div class="card-body p-0 text-center bg-black d-flex align-items-center justify-content-center">
                    <!-- 
                        Stream URL is now dynamically loaded from config.js
                    -->
                    <img id="live-stream" src="" class="img-fluid" style="max-height: 480px; width: 100%; object-fit: contain;" alt="Waiting for Stream...">
                </div>
            </div>
        </div>

        <!-- Data Card -->
        <div class="col-md-4">
            <div class="card shadow-sm h-100">
                <div class="card-body text-center status-card" id="card-canteen">
                    <h5 class="card-title">Canteen Density</h5>
                    <h2 class="display-4 fw-bold density-level">waiting...</h2>
                    <p class="card-text">
                        Person Count: <span class="fw-bold person-count">--</span>
                    </p>
                    <hr>
                    <div class="row">
                        <div class="col-6">
                            <small class="text-muted">Trend</small><br>
                            <span class="trend-indicator">--</span>
                        </div>
                        <div class="col-6">
                            <small class="text-muted">Last Updated</small><br>
                            <span class="last-updated">--</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="text-center mt-4">
        <small class="text-muted">System V2.0 - Edge Hybrid Architecture</small>
    </div>
</div>

<script src="config.js"></script>
<script>
    const BASE_API_URL = `${API_CONFIG.BASE_URL}/current-status`;

    // Apply Dynamic Configuration
    document.getElementById('live-stream').src = API_CONFIG.STREAM_URL;
    document.getElementById('stream-title').innerText = `Live Edge Feed (${API_CONFIG.PROFILE.toUpperCase()})`;

    // Only one location for now: The Canteen
    const LOCATION_ID = "canteen";
    const CARD_ID = "card-canteen";

    async function fetchAndUpdate() {
        try {
            const response = await fetch(`${BASE_API_URL}/${LOCATION_ID}`);
            if (!response.ok) throw new Error("Network response was not ok");
            const data = await response.json();
            
            // If data is empty (no connection yet), keep waiting
            if (!data.density_level) return;

            updateCard(CARD_ID, data);
        } catch (error) {
            console.log("Backend polling error", error);
            setOffline(CARD_ID);
        }
    }

    function updateCard(cardId, data) {
        const cardBody = document.getElementById(cardId);
        if (!cardBody) return;

        const densityEl = cardBody.querySelector(".density-level");
        const countEl = cardBody.querySelector(".person-count");
        const trendEl = cardBody.querySelector(".trend-indicator");
        const timeEl = cardBody.querySelector(".last-updated");

        // Update Text
        densityEl.innerText = data.density_level;
        countEl.innerText = data.count;
        trendEl.innerText = data.trend || "Stable";
        
        if (data.timestamp) {
            const date = new Date(data.timestamp);
            timeEl.innerText = date.toLocaleTimeString();
        }

        // Color Coding
        cardBody.classList.remove("bg-low", "bg-medium", "bg-high", "bg-light");
        if (data.density_level === "Low") cardBody.classList.add("bg-low");
        else if (data.density_level === "Medium") cardBody.classList.add("bg-medium");
        else if (data.density_level === "High") cardBody.classList.add("bg-high");
    }

    function setOffline(cardId) {
        const cardBody = document.getElementById(cardId);
        if (cardBody) {
             cardBody.querySelector(".density-level").innerText = "Offline";
             cardBody.classList.remove("bg-low", "bg-medium", "bg-high");
             cardBody.classList.add("bg-light");
        }
    }

    // Poll every 2 seconds
    setInterval(fetchAndUpdate, 2000);
    fetchAndUpdate(); // Initial call
</script>
</body>
</html>
